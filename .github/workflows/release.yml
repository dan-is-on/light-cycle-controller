name: Release

on:
  push:
    branches:
      - main
    paths:
      - CHANGELOG.md
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version override (e.g. 0.1.12). Leave blank to release the top CHANGELOG version."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version and notes from CHANGELOG.md
        id: changelog
        env:
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re
          import sys

          changelog = pathlib.Path("CHANGELOG.md")
          if not changelog.exists():
              print("::error::CHANGELOG.md not found")
              sys.exit(1)

          text = changelog.read_text(encoding="utf-8")
          heading_regex = re.compile(r"^##\s+v?(\d+\.\d+\.\d+)\s*$", re.MULTILINE)

          requested = (os.environ.get("INPUT_VERSION") or "").strip().lstrip("v")
          if requested:
              version = requested
          else:
              first = heading_regex.search(text)
              if first is None:
                  print("::error::No release heading found in CHANGELOG.md (expected '## 0.1.12')")
                  sys.exit(1)
              version = first.group(1)

          section_regex = re.compile(
              rf"^##\s+v?{re.escape(version)}\s*$\n(.*?)(?=^##\s+|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          section_match = section_regex.search(text)
          if section_match is None:
              print(f"::error::Version {version} not found in CHANGELOG.md")
              sys.exit(1)

          notes = section_match.group(1).strip()
          if not notes:
              print(f"::error::CHANGELOG section for {version} is empty")
              sys.exit(1)

          manifest = pathlib.Path("custom_components/light_cycle/manifest.json")
          if not manifest.exists():
              print("::error::custom_components/light_cycle/manifest.json not found")
              sys.exit(1)
          manifest_data = json.loads(manifest.read_text(encoding="utf-8"))
          manifest_version = str(manifest_data.get("version", "")).strip().lstrip("v")
          if manifest_version != version:
              print(
                  f"::error::Version mismatch: CHANGELOG={version} manifest.json={manifest_version or '<missing>'}"
              )
              sys.exit(1)

          pathlib.Path("release_notes.md").write_text(notes + "\n", encoding="utf-8")

          tag = f"v{version}"
          output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as handle:
              handle.write(f"version={version}\n")
              handle.write(f"tag={tag}\n")
          PY

      - name: Check if tag already exists
        id: tag_exists
        shell: bash
        run: |
          if git ls-remote --tags --exit-code origin "refs/tags/${{ steps.changelog.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when release already exists
        if: steps.tag_exists.outputs.exists == 'true'
        shell: bash
        run: |
          echo "Release ${{ steps.changelog.outputs.tag }} already exists. Nothing to do."

      - name: Create GitHub Release (creates tag if needed)
        if: steps.tag_exists.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.changelog.outputs.tag }}
          body_path: release_notes.md
