name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.6)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release variables
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="v${{ inputs.version }}"
            version="${{ inputs.version }}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create tag (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.vars.outputs.tag }}" -m "${{ steps.vars.outputs.tag }}"
          git push origin "${{ steps.vars.outputs.tag }}"

      - name: Extract release notes from CHANGELOG.md
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re
          import sys

          version = os.environ["VERSION"].strip()
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")

          pattern = rf"^## {re.escape(version)}\\n(.*?)(?=^## |\\Z)"
          match = re.search(pattern, text, flags=re.MULTILINE | re.DOTALL)
          if not match:
            print(f"ERROR: Version {version} not found in CHANGELOG.md", file=sys.stderr)
            sys.exit(1)

          notes = match.group(1).strip()
          pathlib.Path("release_notes.md").write_text(notes + "\\n", encoding="utf-8")
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.version }}
          body_path: release_notes.md
