name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.6)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release variables
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="v${{ inputs.version }}"
            version="${{ inputs.version }}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create tag (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/${{ steps.vars.outputs.tag }}" >/dev/null; then
            echo "Tag ${{ steps.vars.outputs.tag }} already exists; skipping tag creation"
          else
            git tag -a "${{ steps.vars.outputs.tag }}" -m "${{ steps.vars.outputs.tag }}"
            git push origin "${{ steps.vars.outputs.tag }}"
          fi

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["VERSION"].strip()
          changelog = pathlib.Path("CHANGELOG.md")
          if not changelog.exists():
            raise SystemExit(0)

          text = changelog.read_text(encoding="utf-8")

          pattern = rf"^## {re.escape(version)}\\n(.*?)(?=^## |\\Z)"
          match = re.search(pattern, text, flags=re.MULTILINE | re.DOTALL)
          if not match:
            raise SystemExit(0)

          notes = match.group(1).strip()
          pathlib.Path("release_notes.md").write_text(notes + "\\n", encoding="utf-8")
          PY
          if [[ -f release_notes.md ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release (from CHANGELOG)
        if: steps.changelog.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.version }}
          body_path: release_notes.md

      - name: Publish GitHub Release (auto notes)
        if: steps.changelog.outputs.found != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.version }}
          generate_release_notes: true
